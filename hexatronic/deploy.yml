# ============================================================
# .github/workflows/deploy.yml
# Triggers on push to master or main:
#   1. Build & push Docker image to ACR
#   2. Scan Azure RG for existing databases
#   3. Deploy Bicep infrastructure
#   4. Update Container App with new image
# ============================================================

name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:       # Allow manual trigger from GitHub UI
    inputs:
      target_environment:
        description: 'GitHub Environment to deploy (tenant-specific config)'
        required: true
        default: 'production'
      force_sql_deploy:
        description: 'Force deploy new SQL database (true/false)'
        required: false
        default: 'false'

env:
  IMAGE_NAME: ${{ github.event.repository.name }}

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1: Build and push Docker image
  # ────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || vars.DEFAULT_GITHUB_ENVIRONMENT || 'production' }}
    permissions:
      contents: read
      id-token: write       # Required for OIDC login to Azure
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      ENVIRONMENT_NAME: ${{ vars.ENVIRONMENT_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
      ENTRA_LOGIN_CLIENT_ID: ${{ vars.ENTRA_LOGIN_CLIENT_ID }}

    outputs:
      image_sha: ${{ steps.naming.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show target environment
        shell: bash
        run: |
          echo "Deploy target environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || vars.DEFAULT_GITHUB_ENVIRONMENT || 'production' }}"

      - name: Validate OIDC variables
        shell: bash
        run: |
          for required in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_RESOURCE_GROUP AZURE_LOCATION ENVIRONMENT_NAME; do
            if [[ -z "${!required}" ]]; then
              echo "Missing required repository variable: $required"
              exit 1
            fi
          done

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Derive ACR name automatically
        id: naming
        run: |
          SAFE_ENV=$(echo "${{ env.ENVIRONMENT_NAME }}" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9')
          if [[ -z "$SAFE_ENV" ]]; then SAFE_ENV="app"; fi
          ACR_NAME="${SAFE_ENV}acr"
          ACR_NAME="${ACR_NAME:0:50}"
          if [[ ${#ACR_NAME} -lt 5 ]]; then ACR_NAME="acr${GITHUB_RUN_ID}"; fi

          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=${ACR_NAME}.azurecr.io" >> "$GITHUB_OUTPUT"

      - name: Ensure ACR exists
        run: |
          az acr show --name "${{ steps.naming.outputs.acr_name }}" --resource-group "$AZURE_RESOURCE_GROUP" >/dev/null 2>&1 || \
          az acr create \
            --name "${{ steps.naming.outputs.acr_name }}" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --location "$AZURE_LOCATION" \
            --sku Basic \
            --admin-enabled false

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ steps.naming.outputs.acr_name }}"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.naming.outputs.acr_login_server }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────
  # JOB 2: Scan databases & Deploy infrastructure
  # ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Infrastructure & App
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || vars.DEFAULT_GITHUB_ENVIRONMENT || 'production' }}
    permissions:
      id-token: write       # Required for OIDC login to Azure
      contents: read
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      ENVIRONMENT_NAME: ${{ vars.ENVIRONMENT_NAME }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
      ENTRA_LOGIN_CLIENT_ID: ${{ vars.ENTRA_LOGIN_CLIENT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate OIDC variables
        shell: bash
        run: |
          for required in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_RESOURCE_GROUP AZURE_LOCATION ENVIRONMENT_NAME KEY_VAULT_NAME ENTRA_LOGIN_CLIENT_ID; do
            if [[ -z "${!required}" ]]; then
              echo "Missing required repository variable: $required"
              exit 1
            fi
          done

      # ── Azure Login via OIDC (no stored credentials!) ───────
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve AI secrets from Key Vault
        id: resolve_ai_secrets
        shell: bash
        run: |
          KEY_VAULT_NAME="${{ vars.KEY_VAULT_NAME }}"
          if [[ -z "$KEY_VAULT_NAME" ]]; then
            echo "Missing required repository variable: KEY_VAULT_NAME"
            exit 1
          fi

          FOUNDRY_SECRET_NAME="${{ vars.FOUNDRY_API_KEY_SECRET_NAME }}"
          if [[ -z "$FOUNDRY_SECRET_NAME" ]]; then
            FOUNDRY_SECRET_NAME="foundry-api-key"
          fi

          FOUNDRY_API_KEY_VALUE=$(az keyvault secret show \
            --vault-name "$KEY_VAULT_NAME" \
            --name "$FOUNDRY_SECRET_NAME" \
            --query value \
            -o tsv)

          if [[ -z "$FOUNDRY_API_KEY_VALUE" ]]; then
            echo "Key Vault secret is empty or not found. Vault: $KEY_VAULT_NAME, Secret: $FOUNDRY_SECRET_NAME"
            exit 1
          fi

          OPENAI_API_KEY_VALUE=""
          OPENAI_SECRET_NAME="${{ vars.OPENAI_API_KEY_SECRET_NAME }}"
          if [[ -z "$OPENAI_SECRET_NAME" ]]; then
            OPENAI_SECRET_NAME="openai-api-key"
          fi

          OPENAI_API_KEY_VALUE=$(az keyvault secret show \
            --vault-name "$KEY_VAULT_NAME" \
            --name "$OPENAI_SECRET_NAME" \
            --query value \
            -o tsv 2>/dev/null || true)

          echo "::add-mask::$FOUNDRY_API_KEY_VALUE"
          if [[ -n "$OPENAI_API_KEY_VALUE" ]]; then
            echo "::add-mask::$OPENAI_API_KEY_VALUE"
          fi
          echo "foundry_api_key=$FOUNDRY_API_KEY_VALUE" >> "$GITHUB_OUTPUT"
          echo "openai_api_key=$OPENAI_API_KEY_VALUE" >> "$GITHUB_OUTPUT"

      - name: Find infrastructure folder
        id: infra
        run: |
          if [[ -f "./hexatronic/main.bicep" ]]; then
            echo "infra_dir=./hexatronic" >> "$GITHUB_OUTPUT"
          elif [[ -f "./Project.Infra/main.bicep" ]]; then
            echo "infra_dir=./Project.Infra" >> "$GITHUB_OUTPUT"
          elif [[ -f "./infra/main.bicep" ]]; then
            echo "infra_dir=./infra" >> "$GITHUB_OUTPUT"
          elif [[ -f "./main.bicep" ]]; then
            echo "infra_dir=." >> "$GITHUB_OUTPUT"
          else
            echo "❌ main.bicep not found in ./Project.Infra, ./infra, or root"
            exit 1
          fi

      # ── Scan for existing databases ──────────────────────────
      - name: Scan for existing databases
        id: db_scan
        run: |
          echo "🔍 Scanning resource group for existing databases..."

          SQL_COUNT=$(az sql server list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "length(@)" -o tsv 2>/dev/null || echo "0")

          COSMOS_COUNT=$(az cosmosdb list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "length(@)" -o tsv 2>/dev/null || echo "0")

          PG_COUNT=$(az postgres flexible-server list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --query "length(@)" -o tsv 2>/dev/null || echo "0")

          echo "SQL servers: $SQL_COUNT | CosmosDB: $COSMOS_COUNT | PostgreSQL: $PG_COUNT"

          TOTAL=$((SQL_COUNT + COSMOS_COUNT + PG_COUNT))
          DEPLOY_SQL=false
          EXISTING_CONN=""

          if [[ "$SQL_COUNT" -gt 0 ]]; then
            SQL_SERVER_NAME=$(az sql server list --resource-group "$AZURE_RESOURCE_GROUP" --query "[0].name" -o tsv 2>/dev/null || echo "")
            if [[ -n "$SQL_SERVER_NAME" ]]; then
              SQL_DB_NAME=$(az sql db list --resource-group "$AZURE_RESOURCE_GROUP" --server "$SQL_SERVER_NAME" --query "[?name!='master']|[0].name" -o tsv 2>/dev/null || echo "")
              if [[ -n "$SQL_DB_NAME" ]]; then
                EXISTING_CONN="Server=tcp:${SQL_SERVER_NAME}.database.windows.net,1433;Initial Catalog=${SQL_DB_NAME};Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;Authentication=Active Directory Managed Identity;"
                echo "✅ Existing SQL database found and wired with managed identity auth"
              fi
            fi
          fi

          if [[ -z "$EXISTING_CONN" && "$TOTAL" -eq 0 ]]; then
            echo "🆕 No databases found — will deploy new Azure SQL"
            DEPLOY_SQL=true
          fi

          # Allow manual override via workflow_dispatch
          if [[ "${{ github.event.inputs.force_sql_deploy }}" == "true" ]]; then
            DEPLOY_SQL=true
          fi

          SQL_ADMIN_LOGIN="sqladmin"
          SQL_ADMIN_PASSWORD="$(openssl rand -base64 18 | tr -dc 'A-Za-z0-9' | head -c 16)Aa1!"

          echo "deploy_sql=$DEPLOY_SQL" >> "$GITHUB_OUTPUT"
          echo "existing_conn=$EXISTING_CONN" >> "$GITHUB_OUTPUT"
          echo "sql_admin_login=$SQL_ADMIN_LOGIN" >> "$GITHUB_OUTPUT"
          echo "sql_admin_password=$SQL_ADMIN_PASSWORD" >> "$GITHUB_OUTPUT"

      # ── Deploy Bicep ──────────────────────────────────────────
      - name: Deploy Bicep infrastructure
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: ${{ steps.infra.outputs.infra_dir }}/main.bicep
          parameters: >
            location="${{ env.AZURE_LOCATION }}"
            environmentName="${{ env.ENVIRONMENT_NAME }}"
            containerImage="${{ needs.build.outputs.image_sha }}"
            deploySql=${{ steps.db_scan.outputs.deploy_sql }}
            existingDatabaseConnectionString="${{ steps.db_scan.outputs.existing_conn }}"
            sqlAdminLogin="${{ steps.db_scan.outputs.sql_admin_login }}"
            sqlAdminPassword="${{ steps.db_scan.outputs.sql_admin_password }}"
            foundryEndpoint="${{ vars.FOUNDRY_ENDPOINT }}"
            foundryProjectEndpoint="${{ vars.FOUNDRY_PROJECT_ENDPOINT }}"
            foundryApiKey="${{ steps.resolve_ai_secrets.outputs.foundry_api_key }}"
            foundryDeployment="${{ vars.FOUNDRY_DEPLOYMENT }}"
            foundryApiVersion="${{ vars.FOUNDRY_API_VERSION }}"
            openAiApiKey="${{ steps.resolve_ai_secrets.outputs.openai_api_key }}"
            openAiModel="${{ vars.OPENAI_MODEL }}"
          failOnStdErr: false
          deploymentName: deploy-${{ github.run_number }}-${{ github.sha }}

      # ── Print deployed URL ────────────────────────────────────
      - name: Print app URL
        run: |
          echo "✅ Deployment complete!"
          echo "🌍 App URL: ${{ steps.deploy.outputs.containerAppUrl }}"

      - name: Seed Azure App Configuration values (optional)
        shell: bash
        run: |
          APP_CONFIG_NAME="${{ steps.deploy.outputs.appConfigurationName }}"
          if [[ -z "$APP_CONFIG_NAME" ]]; then
            echo "No App Configuration output returned. Skipping config seed."
            exit 0
          fi

          APP_CONFIG_CONNECTION_STRING=$(az appconfig credential list \
            --name "$APP_CONFIG_NAME" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --query "[0].connectionString" \
            -o tsv)

          if [[ -z "$APP_CONFIG_CONNECTION_STRING" ]]; then
            echo "Unable to resolve App Configuration connection string."
            exit 1
          fi

          CONFIG_LABEL="${{ env.ENVIRONMENT_NAME }}"

          set_kv() {
            local key="$1"
            local value="$2"
            if [[ -n "$value" ]]; then
              az appconfig kv set \
                --connection-string "$APP_CONFIG_CONNECTION_STRING" \
                --key "$key" \
                --label "$CONFIG_LABEL" \
                --value "$value" \
                --yes \
                --output none
            fi
          }

          set_kv "FOUNDRY_PROJECT_ENDPOINT" "${{ vars.FOUNDRY_PROJECT_ENDPOINT }}"
          set_kv "AZURE_FOUNDRY_ENDPOINT" "${{ vars.FOUNDRY_ENDPOINT }}"
          set_kv "FOUNDRY_DEPLOYMENT" "${{ vars.FOUNDRY_DEPLOYMENT }}"
          set_kv "FOUNDRY_API_VERSION" "${{ vars.FOUNDRY_API_VERSION }}"
          set_kv "OPENAI_MODEL" "${{ vars.OPENAI_MODEL }}"

      - name: Resolve Entra login secret from Key Vault
        shell: bash
        run: |
          KEY_VAULT_NAME="${{ vars.KEY_VAULT_NAME }}"
          if [[ -z "$KEY_VAULT_NAME" ]]; then
            echo "Missing required repository variable: KEY_VAULT_NAME"
            exit 1
          fi

          SECRET_NAME="${{ vars.ENTRA_LOGIN_CLIENT_SECRET_NAME }}"
          if [[ -z "$SECRET_NAME" ]]; then
            SECRET_NAME="entra-login-client-secret"
          fi

          ENTRA_LOGIN_CLIENT_SECRET=$(az keyvault secret show \
            --vault-name "$KEY_VAULT_NAME" \
            --name "$SECRET_NAME" \
            --query value \
            -o tsv)

          if [[ -z "$ENTRA_LOGIN_CLIENT_SECRET" ]]; then
            echo "Key Vault secret is empty or not found. Vault: $KEY_VAULT_NAME, Secret: $SECRET_NAME"
            exit 1
          fi

          echo "::add-mask::$ENTRA_LOGIN_CLIENT_SECRET"
          echo "ENTRA_LOGIN_CLIENT_SECRET=$ENTRA_LOGIN_CLIENT_SECRET" >> "$GITHUB_ENV"

      - name: Enforce Entra Authentication
        shell: bash
        run: |
          APP_NAME="${{ env.ENVIRONMENT_NAME }}-app"
          AUTH_TENANT_ID="${{ vars.ENTRA_AUTH_TENANT_ID }}"
          if [[ -z "$AUTH_TENANT_ID" ]]; then
            AUTH_TENANT_ID="${{ env.AZURE_TENANT_ID }}"
          fi

          if [[ -z "${{ vars.ENTRA_LOGIN_CLIENT_ID }}" ]]; then
            echo "Missing required repository variable: ENTRA_LOGIN_CLIENT_ID"
            exit 1
          fi

          if [[ -z "${ENTRA_LOGIN_CLIENT_SECRET:-}" ]]; then
            echo "ENTRA_LOGIN_CLIENT_SECRET was not resolved from Key Vault."
            exit 1
          fi

          az containerapp auth microsoft update \
            --name "$APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --client-id "${{ vars.ENTRA_LOGIN_CLIENT_ID }}" \
            --client-secret "$ENTRA_LOGIN_CLIENT_SECRET" \
            --tenant-id "$AUTH_TENANT_ID" \
            --yes \
            --output none

          az containerapp auth update \
            --name "$APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --enabled true \
            --unauthenticated-client-action RedirectToLoginPage \
            --excluded-paths /health \
            --yes \
            --output none

      # ── Update Container App image (idempotent fast path) ────
      # This is a fast update when only the image changes – no full Bicep run needed.
      - name: Force image update (fast path)
        if: success()
        run: |
          APP_NAME="${{ env.ENVIRONMENT_NAME }}-app"
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "${{ needs.build.outputs.image_sha }}" \
            --output table
